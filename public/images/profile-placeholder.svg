<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-labelledby="title desc">
  <title id="title">Profile photo placeholder</title>
  <desc id="desc">Abstract teal portrait placeholder for the portfolio profile card.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#243f3f"/>
      <stop offset="0.55" stop-color="#5f918c"/>
      <stop offset="1" stop-color="#2fb8b0"/>
